sensor:
  - platform: adc
    pin: ${probe_pin}
    name: "Cal Raw Voltage ${probe_id}"
    id: cal_voltage_${probe_id}
    update_interval: 1s
    attenuation: 12db
    unit_of_measurement: "V"
    accuracy_decimals: 3
    on_value:
      then:
        - lambda: |-
            if (isnan(x) || x < 0.0f || x > 5.0f) {
              return;
            }
            float raw = x;
            static float buf[10] = {0};
            static int idx = 0;
            static int cnt = 0;
            static bool initialized = false;
            if (!initialized) {
              for (int i = 0; i < 10; i++) buf[i] = raw;
              initialized = true;
              cnt = 10;
            }
            buf[idx] = raw;
            idx = (idx + 1) % 10;
            if (cnt < 10) cnt++;
            float sum = 0.0f;
            for (int i = 0; i < cnt; i++) {
              sum += buf[i];
            }
            float avg = roundf(sum / cnt * 100.0f) / 100.0f;

            // 0–0.8 MPa probe (same breakpoints as former cal_0_08Mpa)
            static const float table[][2] = {
              {0.000f, 0.0f}, {0.110f, 10.0f}, {0.260f, 20.0f}, {0.410f, 30.0f},
              {0.560f, 40.0f}, {0.710f, 50.0f}, {0.860f, 60.0f}, {1.010f, 70.0f},
              {1.160f, 80.0f}, {1.310f, 90.0f}, {1.460f, 100.0f},
            };
            const int TABLE_SIZE = sizeof(table) / sizeof(table[0]);
            float psi = 0.0f;
            if (avg < table[0][0]) {
              psi = 0.0f;
            } else if (avg > table[TABLE_SIZE - 1][0]) {
              psi = table[TABLE_SIZE - 1][1];
            } else {
              for (int i = 0; i < TABLE_SIZE - 1; i++) {
                float x0 = table[i][0], x1 = table[i + 1][0];
                if (avg >= x0 && avg <= x1) {
                  float y0 = table[i][1], y1 = table[i + 1][1];
                  psi = y0 + (avg - x0) * (y1 - y0) / (x1 - x0);
                  break;
                }
              }
            }
            ESP_LOGI("cal", "${probe_pin}  Raw: %5.3f V  Avg: %4.2f V  PSI: %5.1f", raw, avg, psi);
