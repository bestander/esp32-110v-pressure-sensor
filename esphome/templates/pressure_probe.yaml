# Arduino / default API — PSI via copy + calibrate_linear (0–1.0 MPa curve).
sensor:
  - platform: adc
    pin: ${probe_pin}
    name: "Raw Voltage ${probe_id}"
    id: pressure_voltage_${probe_id}
    update_interval: 1s
    attenuation: 12db
    unit_of_measurement: "V"
    accuracy_decimals: 3
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60

  - platform: copy
    source_id: pressure_voltage_${probe_id}
    name: "PSI ${probe_id}"
    id: psi_${probe_id}
    unit_of_measurement: "psi"
    accuracy_decimals: 1
    device_class: pressure
    state_class: measurement
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 0.000 -> 0.0
            - 0.120 -> 10.0
            - 0.230 -> 20.0
            - 0.340 -> 30.0
            - 0.450 -> 40.0
            - 0.560 -> 50.0
            - 0.680 -> 60.0
            - 0.800 -> 70.0
            - 0.920 -> 80.0
            - 1.040 -> 90.0
            - 1.160 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
