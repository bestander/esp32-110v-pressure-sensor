# ESP-IDF compatible — no template sensors (linking issues with ESP-IDF).
# Add PSI in the main YAML with copy + calibrate_linear (see example-config.yaml).
sensor:
  - platform: adc
    pin: ${probe_pin}
    name: "Raw Voltage ${probe_id}"
    id: pressure_voltage_${probe_id}
    update_interval: 1s
    attenuation: 12db
    unit_of_measurement: "V"
    accuracy_decimals: 3
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60
