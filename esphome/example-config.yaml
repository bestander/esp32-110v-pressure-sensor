esphome:
  name: "water-pressure-01"
  friendly_name: "Water Pressure 01"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret pressure_probe_encryption_key

ota:
  - platform: esphome
    password: !secret pressure_probe_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Water-Pressure-01-Fallback"
    password: !secret pressure_probe_wifi_ap_password

captive_portal:

# 0–1.0 MPa probe: voltage → PSI (edit here if you recalibrate).
.cal_0_1mpa_psi: &cal_0_1mpa_psi
  method: exact
  datapoints:
    - 0.000 -> 0.0
    - 0.120 -> 10.0
    - 0.230 -> 20.0
    - 0.340 -> 30.0
    - 0.450 -> 40.0
    - 0.560 -> 50.0
    - 0.680 -> 60.0
    - 0.800 -> 70.0
    - 0.920 -> 80.0
    - 1.040 -> 90.0
    - 1.160 -> 100.0

sensor:
  - platform: copy
    source_id: pressure_voltage_1
    name: "PSI 1"
    unit_of_measurement: "psi"
    accuracy_decimals: 1
    device_class: pressure
    state_class: measurement
    filters:
      - calibrate_linear: *cal_0_1mpa_psi
      - clamp:
          min_value: 0.0
          max_value: 100.0
  - platform: copy
    source_id: pressure_voltage_2
    name: "PSI 2"
    unit_of_measurement: "psi"
    accuracy_decimals: 1
    device_class: pressure
    state_class: measurement
    filters:
      - calibrate_linear: *cal_0_1mpa_psi
      - clamp:
          min_value: 0.0
          max_value: 100.0

packages:
  probe1: !include
    file: templates/pressure_probe_espidf.yaml
    vars:
      probe_id: "1"
      probe_pin: GPIO1
  probe2: !include
    file: templates/pressure_probe_espidf.yaml
    vars:
      probe_id: "2"
      probe_pin: GPIO3
