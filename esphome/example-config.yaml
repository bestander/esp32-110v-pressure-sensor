esphome:
  name: "water-pressure-01"
  friendly_name: "Water Pressure 01"
  includes:
    - templates/calibration_tables.h
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret pressure_probe_encryption_key

ota:
  - platform: esphome
    password: !secret pressure_probe_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Water-Pressure-01-Fallback"
    password: !secret pressure_probe_wifi_ap_password

captive_portal:

# NOTE: Using ESP-IDF compatible version without template sensors
# Template sensors have linking issues with ESP-IDF framework
# PSI values are calculated and logged - use Home Assistant templates
# to create a PSI sensor from the voltage reading if needed
packages:
  probe1: !include
    file: templates/pressure_probe_espidf.yaml
    vars:
      probe_id: "1"
      probe_pin: GPIO1
      calibration_id: "0-1.0MPa"
  probe2: !include
    file: templates/pressure_probe_espidf.yaml
    vars:
      probe_id: "2"
      probe_pin: GPIO3
      calibration_id: "0-1.0MPa"
